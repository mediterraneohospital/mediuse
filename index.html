<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediUse</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1e2a2a;color:#e0f0f0;font-family:Arial,sans-serif;min-height:100vh}
#app{max-width:1200px;margin:0 auto;padding:1.5rem}
h1{font-size:24px;font-weight:700;color:#e0f0f0;margin-bottom:.5rem;display:flex;align-items:center;gap:0}
.subtitle{font-size:13px;color:#7ab8b8;margin-bottom:1.5rem}
.sync-bar{display:flex;align-items:center;gap:10px;background:#243333;border:1px solid #2e4444;border-radius:10px;padding:8px 14px;margin-bottom:1.25rem;font-size:12px;color:#7ab8b8}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#446666;flex-shrink:0}
.sync-dot.ok{background:#4ade80}
.sync-dot.err{background:#e74c3c}
.sync-dot.loading{background:#f0c040;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.cat-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.cat-tab{padding:8px 20px;border-radius:8px;border:2px solid #2e4444;background:#1a2828;color:#7ab8b8;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.cat-tab.active.tavi{background:#1e4d7a;border-color:#60a5fa;color:#bfdbfe}
.cat-tab.active.boston{background:#14532d;border-color:#4ade80;color:#bbf7d0}
.cat-tab.active.evar{background:#3b0764;border-color:#c084fc;color:#e9d5ff}
.cat-tab:hover:not(.active){background:#243333;color:#e0f0f0;border-color:#4db6ac}

.add-panel{background:#243333;border:1px solid #2e4444;border-radius:10px;padding:16px;margin-bottom:1.25rem}
.add-panel h3{font-size:12px;color:#80cbc4;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:#80cbc4;text-transform:uppercase;letter-spacing:.3px}
.inp{background:#1a2828;border:1px solid #2e4444;border-radius:6px;padding:8px 12px;color:#e0f0f0;font-size:14px;outline:none;width:100%}
.inp:focus{border-color:#4db6ac}
.inp::placeholder{color:#446666}
.inp-date{color:#e0f0f0}
.sel{background:#1a2828;border:1px solid #2e4444;border-radius:6px;padding:8px 10px;color:#e0f0f0;font-size:13px;outline:none;cursor:pointer;width:100%}
.sel option{background:#1e2a2a;color:#e0f0f0}
.form-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.add-btn{background:#00897b;color:#fff;border:none;border-radius:6px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer}
.add-btn:hover{background:#00796b}
.clear-btn{background:transparent;border:1px solid #2e4444;border-radius:6px;padding:9px 14px;font-size:13px;color:#7ab8b8;cursor:pointer}
.clear-btn:hover{border-color:#4db6ac;color:#e0f0f0}

.toolbar{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center;justify-content:space-between}
.search-inp{background:#1a2828;border:1px solid #2e4444;border-radius:6px;padding:7px 12px;color:#e0f0f0;font-size:13px;outline:none;flex:1;min-width:180px}
.search-inp:focus{border-color:#4db6ac}
.search-inp::placeholder{color:#446666}
.sort-row{display:flex;gap:6px}
.sort-btn{padding:4px 12px;border-radius:6px;border:1px solid #2e4444;background:#243333;color:#7ab8b8;cursor:pointer;font-size:12px;transition:all .15s}
.sort-btn.active{background:#00897b;color:#fff;border-color:#00796b}
.sort-btn:hover:not(.active){color:#b2dfdb;border-color:#4db6ac}

.bulk-bar{display:flex;align-items:center;gap:10px;background:#1a3333;border:1px solid #00897b;border-radius:10px;padding:10px 14px;margin-bottom:.75rem;flex-wrap:wrap}
.bulk-bar.hidden{display:none}
.bulk-info{font-size:13px;color:#80cbc4;flex:1}
.bulk-subtotal{font-size:13px;color:#e0f0f0;font-weight:600}
.bulk-btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.bulk-done-btn{background:#00897b;color:#fff}
.bulk-done-btn:hover{background:#00796b}
.bulk-clear-btn{background:#2e4444;color:#7ab8b8;border:1px solid #446666}
.bulk-clear-btn:hover{color:#e0f0f0}

.alert-bar{background:#2a1a0a;border:1px solid #7a4a1a;border-radius:10px;padding:10px 14px;margin-bottom:.75rem;font-size:12px;display:none}
.alert-bar.show{display:block}
.alert-item{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.alert-item:last-child{margin-bottom:0}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alert-dot.red{background:#e74c3c}
.alert-dot.orange{background:#f97316}

.stats{display:flex;gap:12px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.stat{font-size:12px;color:#7ab8b8}
.stat span{color:#b2dfdb;font-weight:500}
.stat.highlight span{color:#4db6ac}

.records{display:flex;flex-direction:column;gap:6px}
.record-item{background:#243333;border:1px solid #2e4444;border-radius:10px;padding:12px 14px;transition:border-color .15s}
.record-item:hover{border-color:#4db6ac}
.record-item.selected{border-color:#00897b;background:#1a3333}
.record-item.completed-style{opacity:.6}
.record-top{display:flex;align-items:flex-start;gap:10px}
.record-cb{width:16px;height:16px;cursor:pointer;accent-color:#00897b;flex-shrink:0;margin-top:3px}
.record-main{flex:1;min-width:0}
.record-date{font-size:11px;color:#4db6ac;margin-bottom:2px}
.record-patient{font-size:15px;font-weight:600;color:#e0f0f0;margin-bottom:4px}
.record-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:12px;background:#2e4444;color:#80cbc4}
.tag.green{background:#1a3a2a;color:#4ade80}
.tag.blue{background:#1a2a3a;color:#4db6ac}
.tag.purple{background:#2a1a3a;color:#c084fc}
.tag.red{background:#3a1a1a;color:#f87171}
.tag.yellow{background:#2a2a0a;color:#fbbf24}
.tag.orange{background:#2a1a0a;color:#f97316}
.credit-due{font-size:11px;margin-top:3px;padding:3px 8px;border-radius:6px;display:inline-block}
.credit-due.overdue{background:#3a1a1a;color:#f87171}
.credit-due.soon{background:#2a1a0a;color:#f97316}
.credit-due.ok{background:#1a3a2a;color:#6ee7b7}
.record-notes{font-size:12px;color:#b2dfdb;margin-top:4px;border-left:2px solid #2e4444;padding-left:8px}
.record-actions{display:flex;gap:5px;flex-shrink:0}
.icon-btn{background:#2e4444;border:1px solid #3a5555;border-radius:6px;padding:6px 8px;color:#80cbc4;cursor:pointer;font-size:14px;line-height:1;transition:all .15s}
.icon-btn:hover{background:#3a5555;color:#e0f0f0}
.icon-btn.del:hover{background:#3a1a1a;border-color:#7a1e1e;color:#e74c3c}
.empty{text-align:center;padding:3rem;color:#446666;font-size:14px}

.edit-panel{background:#1a2828;border:1px solid #2e4444;border-radius:8px;padding:14px;margin-top:10px}
.edit-panel .form-grid{margin-bottom:10px}
.save-btn{background:#00897b;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer}
.save-btn:hover{background:#00796b}
.cancel-btn{background:transparent;border:1px solid #2e4444;border-radius:6px;padding:7px 14px;font-size:13px;color:#7ab8b8;cursor:pointer}
.cancel-btn:hover{border-color:#4db6ac}

input[type=date]{color-scheme:dark}
@media(max-width:600px){.form-grid{grid-template-columns:1fr 1fr}.toolbar{flex-direction:column}}

/* ── Τιμοκατάλογος Tab ── */
.cat-tab.active.pricelist{background:#3a1f00;border-color:#f59e0b;color:#fcd34d}
.pl-search-wrap{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.pl-search-inp{background:#1a2828;border:1px solid #2e4444;border-radius:8px;padding:10px 16px;color:#e0f0f0;font-size:15px;outline:none;flex:1;min-width:220px}
.pl-search-inp:focus{border-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.15)}
.pl-search-inp::placeholder{color:#446666}
.pl-filter-row{display:flex;gap:6px;flex-wrap:wrap}
.pl-filter-btn{padding:6px 14px;border-radius:6px;border:1px solid #2e4444;background:#1a2828;color:#7ab8b8;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.pl-filter-btn.active{background:#3a1f00;border-color:#f59e0b;color:#fcd34d}
.pl-filter-btn:hover:not(.active){background:#243333;color:#e0f0f0}
.pl-result{background:#243333;border:1px solid #2e4444;border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:border-color .15s}
.pl-result:hover{border-color:#4db6ac}
.pl-result-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.pl-ref{font-size:15px;color:#f59e0b;font-weight:700;letter-spacing:.5px;font-family:monospace}
.pl-supplier-tag{font-size:13px;padding:3px 10px;border-radius:10px;font-weight:600}
.pl-supplier-tag.boston{background:#14532d;color:#4ade80}
.pl-supplier-tag.medtronic{background:#1e3a5f;color:#60a5fa}
.pl-desc{font-size:14px;color:#e0f0f0;font-weight:500;margin-bottom:10px}
.pl-prices{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.pl-price-box{background:#1a2828;border:1px solid #2e4444;border-radius:8px;padding:8px 14px;text-align:center;min-width:130px}
.pl-price-box.primary{border-color:#f59e0b;background:#2a1a00}
.pl-price-label{font-size:10px;color:#7ab8b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.pl-price-val{font-size:17px;font-weight:700;color:#fcd34d}
.pl-price-val.secondary{color:#b2dfdb;font-size:15px}
.pl-price-val.free{color:#4ade80;font-size:14px}
.pl-cat-badge{font-size:12px;padding:3px 9px;border-radius:8px;background:#2e4444;color:#80cbc4;margin-top:0;display:inline-block}
.pl-bundle{background:#1a2828;border:1px solid #2e3d3d;border-radius:8px;padding:10px 14px;margin-top:8px}
.pl-bundle-title{font-size:11px;color:#f59e0b;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.pl-bundle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #2e3d3d;font-size:12px;gap:8px}
.pl-bundle-row:last-child{border-bottom:none}
.pl-bundle-code{color:#7ab8b8;font-family:monospace;font-size:11px;flex-shrink:0}
.pl-bundle-desc{color:#b2dfdb;flex:1}
.pl-bundle-qty{color:#80cbc4;flex-shrink:0}
.pl-bundle-price{font-weight:600;flex-shrink:0}
.pl-bundle-price.free{color:#4ade80}
.pl-bundle-price.normal{color:#fcd34d}
.pl-bundle-total{display:flex;justify-content:flex-end;margin-top:6px;padding-top:6px;border-top:1px solid #f59e0b33}
.pl-bundle-total-val{font-size:13px;font-weight:700;color:#fcd34d}
.pl-empty{text-align:center;padding:3rem;color:#446666;font-size:14px}
.pl-implant-toggle{display:flex;gap:6px;margin-bottom:10px}
.pl-implant-btn{padding:6px 16px;border-radius:6px;border:1px solid #2e4444;background:#1a2828;color:#7ab8b8;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.pl-implant-btn.active{background:#1a3a2a;border-color:#4ade80;color:#4ade80}
.pl-implant-btn:hover:not(.active){background:#243333;color:#e0f0f0}
.pl-hint{font-size:12px;color:#446666;margin-bottom:1rem}

.done-dropdown{position:relative;display:inline-block}
.done-dropdown-btn{padding:7px 16px;border-radius:6px;border:2px solid transparent;background:#1a2828;color:#7ab8b8;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.done-dropdown-btn.active{background:#302000;border-color:#f59e0b;color:#fcd34d}
.done-dropdown-btn:hover{background:#243333;color:#b2dfdb;border-color:#4db6ac}
.done-dropdown-menu{position:absolute;top:110%;left:0;background:#243333;border:1px solid #2e4444;border-radius:8px;padding:4px;z-index:100;min-width:160px;display:none;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.done-dropdown-menu.open{display:flex}
.done-menu-item{padding:8px 12px;border-radius:6px;border:none;background:transparent;color:#7ab8b8;cursor:pointer;font-size:13px;text-align:left;transition:all .15s}
.done-menu-item:hover{background:#2e4444;color:#e0f0f0}
.done-menu-item.active{background:#302000;border:1px solid #f59e0b;color:#fcd34d}
</style>
</head>
<body>
<div id="app">
  <h1><span style="color:#1a3a8f;font-weight:800;letter-spacing:-1px">Medi</span><span style="color:#cc1a1a;font-weight:800;letter-spacing:-1px">Use</span></h1>
  <p class="subtitle">Καταγραφή Ιατρικών Επεμβάσεων — Mediterraneo Hospital</p>
  <div class="sync-bar"><div class="sync-dot loading" id="sync-dot"></div><span id="sync-label">Σύνδεση...</span></div>
  <div class="cat-tabs" id="cat-tabs" style="position:relative"></div>
  <div id="add-section"></div>
  <div class="alert-bar" id="alert-bar"></div>
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <input type="checkbox" id="select-all-cb" style="width:16px;height:16px;cursor:pointer;accent-color:#4ade80" onchange="toggleSelectAll(this.checked)" title="Επιλογή όλων"/>
      <label for="select-all-cb" style="font-size:12px;color:#888;cursor:pointer;white-space:nowrap">Όλες</label>
    </div>
    <input class="search-inp" id="search-inp" type="text" placeholder="🔍 Αναζήτηση ασθενή, νοσηλεία..." oninput="render()"/>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <input type="date" id="filter-from" class="inp" style="width:135px;padding:5px 8px;font-size:12px;color:#fff" title="Από" onchange="render()"/>
      <span style="color:#555;font-size:12px">–</span>
      <input type="date" id="filter-to" class="inp" style="width:135px;padding:5px 8px;font-size:12px;color:#fff" title="Έως" onchange="render()"/>
      <button onclick="document.getElementById('filter-from').value='';document.getElementById('filter-to').value='';render();" style="background:transparent;border:1px solid #333;border-radius:6px;padding:5px 8px;color:#666;cursor:pointer;font-size:12px" title="Καθαρισμός φίλτρου">✕</button>
    </div>
    <div class="sort-row">
      <button class="sort-btn active" id="sort-date">📅 Ημερομηνία</button>
      <button class="sort-btn" id="sort-az">🔤 Α-Ω</button>
    </div>
  </div>
  <div class="bulk-bar hidden" id="bulk-bar">
    <span class="bulk-info" id="bulk-info"></span>
    <span class="bulk-subtotal" id="bulk-subtotal"></span>
    <button class="bulk-btn bulk-done-btn" onclick="markSelectedDone()">✅ Ολοκλήρωση επιλεγμένων</button>
    <button class="bulk-btn bulk-clear-btn" onclick="clearSelection()">✕ Αποεπιλογή</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="records" id="records"></div>
</div>

<script>
const SUPA_URL='https://odtbtugzilxsfqxlpofq.supabase.co';
const SUPA_KEY='sb_publishable_ch-7C1ihpZRrxEhXFqV1xA_hXPwq61S';
const ROW_ID=1;

async function supaGet(){
  const r=await fetch(SUPA_URL+'/rest/v1/mediuse?id=eq.'+ROW_ID+'&select=data',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  const j=await r.json();return j&&j.length>0?j[0].data:null;
}
async function supaSet(data){
  const r=await fetch(SUPA_URL+'/rest/v1/mediuse?id=eq.'+ROW_ID,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({data:data})});
  if(!r.ok){await fetch(SUPA_URL+'/rest/v1/mediuse',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({id:ROW_ID,data:data})});}
}

function pad(n){return String(n).padStart(2,'0');}
function fmtDate(d){if(!d)return '';const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y;}
function today(){const n=new Date();return n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());}
function addMonths(dateStr,months){const d=new Date(dateStr);d.setMonth(d.getMonth()+months);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function daysDiff(dateStr){const d=new Date(dateStr),now=new Date();now.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((d-now)/(1000*60*60*24));}

let state={cat:'tavi',viewDone:false,sort:'date',tavi:[],boston:[],evar:[],tavi_done:[],boston_done:[],evar_done:[],selected:{},editingId:null};

function setSyncStatus(s,m){document.getElementById('sync-dot').className='sync-dot '+s;document.getElementById('sync-label').textContent=m;}
let saveTimeout=null;
function save(){localStorage.setItem('mediuse_bk',JSON.stringify(state));clearTimeout(saveTimeout);saveTimeout=setTimeout(saveToCloud,1000);}
async function saveToCloud(){
  setSyncStatus('loading','Αποθήκευση...');
  try{const s={...state,selected:{},editingId:null};await supaSet(JSON.stringify(s));setSyncStatus('ok','Συγχρονισμένο ✓');}
  catch(e){setSyncStatus('err','Σφάλμα αποθήκευσης');}
}
async function loadFromCloud(){
  setSyncStatus('loading','Φόρτωση...');
  try{
    const raw=await supaGet();
    if(raw!==null){
      let data=raw;try{data=JSON.parse(raw);}catch(e){}
      if(typeof data==='string'){try{data=JSON.parse(data);}catch(e){data={};}}
      if(data&&(data.tavi!==undefined||data.boston!==undefined||data.evar!==undefined)){
        state={...state,...data,selected:{},editingId:null,cat:'tavi',viewDone:false,sort:'date'};
      }
      setSyncStatus('ok','Συγχρονισμένο ✓');
    } else loadLocal();
  }catch(e){loadLocal();}
  render();
}
function loadLocal(){
  try{const b=localStorage.getItem('mediuse_bk');if(b){const d=JSON.parse(b);state={...state,...d,selected:{},editingId:null,cat:'tavi',viewDone:false,sort:'date'};}setSyncStatus('err','Offline');}
  catch(e){setSyncStatus('err','Σφάλμα');}
}

const CATS={
  tavi:{label:'TAVI',icon:'🫀',hasAmount:false,fields:[
    {id:'date',label:'Ημερομηνία',type:'date',required:true},
    {id:'nosileia',label:'Νοσηλεία',type:'text',placeholder:'Ν000000'},
    {id:'patient',label:'Ασθενής',type:'text',required:true},
    {id:'invoice_no',label:'Αρ. Τιμολογίου',type:'text'},
    {id:'invoice_date',label:'Ημερ. Τιμολογίου',type:'date'},
    {id:'valve',label:'Βαλβίδα',type:'text',placeholder:'π.χ. EVPRO PLUS-29, Navitor'},
    {id:'company',label:'Εταιρεία',type:'select',options:['Medtronic','Edwards','Flexmed','Abbott','Άλλο']},
    {id:'notes',label:'Παρατηρήσεις',type:'text'},
  ]},
  boston:{label:'Boston ΗΦΕ',icon:'⚡',hasAmount:true,hasCredit:true,fields:[
    {id:'date',label:'Ημερομηνία',type:'date',required:true},
    {id:'nosileia',label:'Νοσηλεία',type:'text',placeholder:'Ν000000'},
    {id:'patient',label:'Ασθενής',type:'text',required:true},
    {id:'inout',label:'Πακέτο/Ασφάλεια',type:'select',options:['Πακέτο','Ασφάλεια']},
    {id:'therapy',label:'Θεραπεία',type:'text',placeholder:'π.χ. PFA, Ablation'},
    {id:'amount',label:'Καθαρό Ποσό (€)',type:'number',placeholder:'0.00'},
    {id:'credit',label:'Πιστωτικό 30% (€)',type:'number',placeholder:'Αυτόματος υπολογισμός',readonly:true},
    {id:'notes',label:'Παρατηρήσεις',type:'text'},
  ]},
  evar:{label:'EVAR',icon:'🩸',hasAmount:true,fields:[
    {id:'date',label:'Ημερομηνία',type:'date',required:true},
    {id:'nosileia',label:'Νοσηλεία',type:'text',placeholder:'Ν000000'},
    {id:'patient',label:'Ασθενής',type:'text',required:true},
    {id:'amount',label:'Καθαρό Ποσό (€)',type:'number',placeholder:'0.00'},
    {id:'notes',label:'Παρατηρήσεις',type:'text'},
  ]}
};



function getKey(){return state.viewDone?state.cat+'_done':state.cat;}
function getRecords(){return state[getKey()]||[];}

function getFiltered(){
  let recs=getRecords();
  const q=(document.getElementById('search-inp')||{}).value||'';
  if(q.trim()) recs=recs.filter(r=>(r.patient||'').toLowerCase().includes(q.toLowerCase())||(r.nosileia||'').toLowerCase().includes(q.toLowerCase())||(r.therapy||'').toLowerCase().includes(q.toLowerCase())||(r.valve||'').toLowerCase().includes(q.toLowerCase()));
  const from=(document.getElementById('filter-from')||{}).value||'';
  const to=(document.getElementById('filter-to')||{}).value||'';
  if(from) recs=recs.filter(r=>r.date&&r.date>=from);
  if(to) recs=recs.filter(r=>r.date&&r.date<=to);
  if(state.sort==='date') recs=[...recs].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  else if(state.sort==='date_asc') recs=[...recs].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  else recs=[...recs].sort((a,b)=>(a.patient||'').localeCompare(b.patient||''));
  return recs;
}

function getSelected(){return Object.keys(state.selected).filter(id=>state.selected[id]);}

function toggleSelectAll(checked){
  const recs=getFiltered();
  if(checked){recs.forEach(r=>{state.selected[r.id]=true;});}
  else{state.selected={};} 
  renderStats();renderBulkBar();renderRecords();
}

function clearSelection(){state.selected={};render();}

function markSelectedDone(){
  const ids=getSelected();if(!ids.length)return;
  if(!confirm('Μεταφορά '+ids.length+' εγγραφών στα Ολοκληρωμένα;'))return;
  const src=state[state.cat]||[];
  const dst=state[state.cat+'_done']||[];
  ids.forEach(id=>{
    const i=src.findIndex(r=>String(r.id)===id);
    if(i>-1){const rec=src.splice(i,1)[0];rec.completedAt=today();dst.unshift(rec);}
  });
  state[state.cat+'_done']=dst;
  state.selected={};save();render();
}

function renderCatTabs(){
  const el=document.getElementById('cat-tabs');el.innerHTML='';
  const mainTabs=[
    {cat:'tavi',done:false,label:'TAVI'},
    {cat:'boston',done:false,label:'Boston ΗΦΕ'},
    {cat:'evar',done:false,label:'EVAR'},
    {cat:'pricelist',done:false,label:'Τιμοκατάλογοι'},
  ];
  mainTabs.forEach(t=>{
    const b=document.createElement('button');
    const active=state.cat===t.cat&&!state.viewDone;
    b.className='cat-tab '+t.cat+(active?' active':'');
    b.textContent=t.label;
    b.onclick=()=>{state.cat=t.cat;state.viewDone=false;state.editingId=null;state.selected={};document.getElementById('search-inp').value='';render();};
    el.appendChild(b);
  });

  // Dropdown for done tabs
  const doneTabs=[
    {cat:'tavi',label:'TAVI Ολοκλ.'},
    {cat:'boston',label:'Boston Ολοκλ.'},
    {cat:'evar',label:'EVAR Ολοκλ.'},
  ];
  const wrap=document.createElement('div');wrap.className='done-dropdown';
  const btn=document.createElement('button');
  btn.className='done-dropdown-btn'+(state.viewDone?' active':'');
  const doneLabel=state.viewDone?({'tavi':'TAVI','boston':'Boston ΗΦΕ','evar':'EVAR'}[state.cat]+' Ολοκλ. ▾'):'Ολοκληρωμένα ▾';
  btn.textContent=doneLabel;
  const menu=document.createElement('div');menu.className='done-dropdown-menu';
  doneTabs.forEach(t=>{
    const item=document.createElement('button');item.className='done-menu-item'+(state.viewDone&&state.cat===t.cat?' active':'');
    item.textContent=t.label;
    item.onclick=(e)=>{e.stopPropagation();state.cat=t.cat;state.viewDone=true;state.editingId=null;state.selected={};document.getElementById('search-inp').value='';menu.classList.remove('open');render();};
    menu.appendChild(item);
  });

function renderAddSection(){
  const sec=document.getElementById('add-section');
  if(state.viewDone||state.cat==='pricelist'){sec.innerHTML='';return;}
  const cat=CATS[state.cat];
  sec.innerHTML='';
  const panel=document.createElement('div');panel.className='add-panel';
  const h3=document.createElement('h3');h3.textContent='+ Νέα Εγγραφή — '+cat.label;panel.appendChild(h3);
  const grid=document.createElement('div');grid.className='form-grid';
  cat.fields.forEach(f=>{
    const g=document.createElement('div');g.className='form-group';
    const lbl=document.createElement('label');lbl.textContent=f.label;
    let inp;
    if(f.type==='select'){
      inp=document.createElement('select');inp.className='sel';inp.id='new_'+f.id;
      f.options.forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;inp.appendChild(opt);});
    } else {
      inp=document.createElement('input');inp.className='inp';
      if(f.type==='date') inp.className+=' inp-date';
      inp.type=f.type||'text';inp.id='new_'+f.id;
      if(f.placeholder) inp.placeholder=f.placeholder;
      if(f.id==='date') inp.value=today();
      if(f.readonly) inp.readOnly=true;
    }
    // Auto-calculate credit for Boston
    if(state.cat==='boston'&&f.id==='amount'){
      inp.oninput=()=>{
        const v=parseFloat(inp.value)||0;
        const cEl=document.getElementById('new_credit');
        if(cEl) cEl.value=v>0?(v*0.3).toFixed(2):'';
      };

    g.appendChild(lbl);g.appendChild(inp);grid.appendChild(g);
  });
  panel.appendChild(grid);
  const actions=document.createElement('div');actions.className='form-actions';
  const addBtn=document.createElement('button');addBtn.className='add-btn';addBtn.textContent='+ Προσθήκη';addBtn.onclick=addRecord;
  const clrBtn=document.createElement('button');clrBtn.className='clear-btn';clrBtn.textContent='✕ Καθαρισμός';
  clrBtn.onclick=()=>{cat.fields.forEach(f=>{const el=document.getElementById('new_'+f.id);if(el)el.value=f.id==='date'?today():'';});};
  actions.appendChild(addBtn);actions.appendChild(clrBtn);panel.appendChild(actions);

function addRecord(){
  const cat=CATS[state.cat];const rec={id:Date.now()};let valid=true;
  cat.fields.forEach(f=>{
    const el=document.getElementById('new_'+f.id);
    if(el) rec[f.id]=el.value.trim();
    if(f.required&&!rec[f.id]){valid=false;el.style.borderColor='#e74c3c';setTimeout(()=>el.style.borderColor='',2000);}
  });
  if(!valid) return;
  if(!state[state.cat]) state[state.cat]=[];
  state[state.cat].unshift(rec);
  cat.fields.forEach(f=>{const el=document.getElementById('new_'+f.id);if(el)el.value=f.id==='date'?today():'';});
  save();render();
}

function renderAlertBar(){
  const bar=document.getElementById('alert-bar');
  if(state.cat!=='boston'||state.viewDone){bar.className='alert-bar';return;}
  const recs=state.boston||[];
  const overdue=recs.filter(r=>r.date&&daysDiff(addMonths(r.date,3))<0);
  const soon=recs.filter(r=>r.date&&daysDiff(addMonths(r.date,3))>=0&&daysDiff(addMonths(r.date,3))<=30);
  if(!overdue.length&&!soon.length){bar.className='alert-bar';return;}
  bar.className='alert-bar show';
  let html='<strong style="font-size:12px;color:#f97316;display:block;margin-bottom:6px">⚠️ Πιστωτικά Boston ΗΦΕ</strong>';
  if(overdue.length) html+='<div class="alert-item"><div class="alert-dot red"></div><span style="color:#f87171">Ληξιπρόθεσμα (>3 μήνες): <strong>'+overdue.length+'</strong> — '+overdue.map(r=>r.patient).join(', ')+'</span></div>';
  if(soon.length) html+='<div class="alert-item"><div class="alert-dot orange"></div><span style="color:#f97316">Λήγουν σύντομα (εντός 30 ημ.): <strong>'+soon.length+'</strong> — '+soon.map(r=>r.patient).join(', ')+'</span></div>';
  bar.innerHTML=html;
}

function renderStats(){
  const recs=getFiltered();const sel=getSelected();
  const el=document.getElementById('stats');
  html_total=recs.length!==getRecords().length?`<div class="stat">Σύνολο: <span>${recs.length}</span> <span style="color:#555">(από ${getRecords().length})</span></div>`:`<div class="stat">Σύνολο: <span>${recs.length}</span></div>`;
  let html=html_total;
  const cat=CATS[state.cat];
  if(cat.hasAmount){
    const useRecs=sel.length>0?recs.filter(r=>state.selected[r.id]):recs;
    const total=useRecs.reduce((s,r)=>s+parseFloat(r.amount||0),0);
    const label=sel.length>0?'Υποσύνολο ('+sel.length+')':'Σύνολο ποσό';
    html+=`<div class="stat highlight"><span>${label}: ${total.toLocaleString('el-GR',{minimumFractionDigits:2})}€</span></div>`;
    if(cat.hasCredit){
      const credit=useRecs.reduce((s,r)=>s+parseFloat(r.credit||0),0);
      html+=`<div class="stat highlight"><span>Πιστωτικά: ${credit.toLocaleString('el-GR',{minimumFractionDigits:2})}€</span></div>`;
    }
  }

  el.innerHTML=html;
}

function renderBulkBar(){
  const sel=getSelected();const bar=document.getElementById('bulk-bar');
  if(!sel.length||state.viewDone){bar.className='bulk-bar hidden';return;}
  bar.className='bulk-bar';
  document.getElementById('bulk-info').textContent='Επιλεγμένα: '+sel.length;
  const cat=CATS[state.cat];
  const selRecs=getRecords().filter(r=>state.selected[r.id]);
  let sub='';
  if(cat.hasAmount){
    const t=selRecs.reduce((s,r)=>s+parseFloat(r.amount||0),0);
    sub='Ποσό: '+t.toLocaleString('el-GR',{minimumFractionDigits:2})+'€';
    if(cat.hasCredit){const c=selRecs.reduce((s,r)=>s+parseFloat(r.credit||0),0);sub+=' | Πιστωτικό: '+c.toLocaleString('el-GR',{minimumFractionDigits:2})+'€';}
  }
  document.getElementById('bulk-subtotal').textContent=sub;
}

function renderSort(){
  const cb=document.getElementById('select-all-cb');
  const cblbl=cb?cb.nextElementSibling:null;
  if(cb){cb.style.display=state.viewDone?'none':'';if(cblbl)cblbl.style.display=state.viewDone?'none':'';}

function makeEditPanel(rec){
  const cat=CATS[state.cat];
  const panel=document.createElement('div');panel.className='edit-panel';
  const grid=document.createElement('div');grid.className='form-grid';
  cat.fields.forEach(f=>{
    const g=document.createElement('div');g.className='form-group';
    const lbl=document.createElement('label');lbl.textContent=f.label;
    let inp;
    if(f.type==='select'){
      inp=document.createElement('select');inp.className='sel';
      f.options.forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;if(rec[f.id]===o)opt.selected=true;inp.appendChild(opt);});
    } else {
      inp=document.createElement('input');inp.className='inp';
      if(f.type==='date') inp.className+=' inp-date';
      inp.type=f.type||'text';inp.value=rec[f.id]||'';
      if(f.placeholder) inp.placeholder=f.placeholder;
    }
    inp.id='edit_'+f.id+'_'+rec.id;
    if(state.cat==='boston'&&f.id==='amount'){
      inp.oninput=()=>{
        const v=parseFloat(inp.value)||0;
        const cEl=document.getElementById('edit_credit_'+rec.id);
        if(cEl) cEl.value=v>0?(v*0.3).toFixed(2):'';
      };
    }

    g.appendChild(lbl);g.appendChild(inp);grid.appendChild(g);
  });
  panel.appendChild(grid);
  const actions=document.createElement('div');actions.className='form-actions';
  const saveBtn=document.createElement('button');saveBtn.className='save-btn';saveBtn.textContent='Αποθήκευση';
  saveBtn.onclick=()=>{
    const key=getKey();const all=state[key];const idx=all.findIndex(r=>r.id===rec.id);if(idx===-1)return;
    cat.fields.forEach(f=>{const el=document.getElementById('edit_'+f.id+'_'+rec.id);if(el)all[idx][f.id]=el.value.trim();});
    state.editingId=null;save();render();
  };
  const canBtn=document.createElement('button');canBtn.className='cancel-btn';canBtn.textContent='Ακύρωση';
  canBtn.onclick=()=>{state.editingId=null;render();};
  actions.appendChild(saveBtn);actions.appendChild(canBtn);panel.appendChild(actions);
  return panel;
}

function renderRecords(){
  const list=document.getElementById('records');const recs=getFiltered();list.innerHTML='';
  if(!recs.length){list.innerHTML='<div class="empty">Καμία εγγραφή.</div>';return;}
  recs.forEach(rec=>{
    const item=document.createElement('div');
    item.className='record-item'+(state.selected[rec.id]?' selected':'')+(state.viewDone?' completed-style':'');
    const top=document.createElement('div');top.className='record-top';

    // Checkbox
    const cb=document.createElement('input');cb.type='checkbox';cb.className='record-cb';
    cb.checked=!!state.selected[rec.id];
    cb.onchange=()=>{if(cb.checked)state.selected[rec.id]=true;else delete state.selected[rec.id];renderStats();renderBulkBar();};
    if(state.viewDone) cb.style.display='none';

    const main=document.createElement('div');main.className='record-main';
    const dateEl=document.createElement('div');dateEl.className='record-date';dateEl.textContent='📅 '+fmtDate(rec.date);main.appendChild(dateEl);
    const patEl=document.createElement('div');patEl.className='record-patient';patEl.textContent=rec.patient||'—';main.appendChild(patEl);

    const tags=document.createElement('div');tags.className='record-tags';
    if(rec.nosileia){const t=document.createElement('span');t.className='tag blue';t.textContent='🏥 '+rec.nosileia;tags.appendChild(t);}

    if(state.cat==='tavi'){
      if(rec.valve){const t=document.createElement('span');t.className='tag purple';t.textContent='🫀 '+rec.valve;tags.appendChild(t);}
      if(rec.company){
        const t=document.createElement('span');
        const cmap={'Medtronic':'tag blue','Edwards':'tag green','Flexmed':'tag orange','Abbott':'tag purple'};
        t.className=cmap[rec.company]||'tag';
        t.textContent=rec.company;
        tags.appendChild(t);
      }
      if(rec.invoice_no){const t=document.createElement('span');t.className='tag green';t.textContent='📄 '+rec.invoice_no;tags.appendChild(t);}

    }
    if(state.cat==='boston'){
      if(rec.inout){const t=document.createElement('span');t.className='tag '+(rec.inout==='Πακέτο'?'green':'yellow');t.textContent=rec.inout;tags.appendChild(t);}
      if(rec.therapy){const t=document.createElement('span');t.className='tag purple';t.textContent='⚡ '+rec.therapy;tags.appendChild(t);}
      if(rec.amount){const t=document.createElement('span');t.className='tag blue';t.textContent='💶 '+parseFloat(rec.amount).toLocaleString('el-GR',{minimumFractionDigits:2})+'€';tags.appendChild(t);}
      if(rec.credit&&parseFloat(rec.credit)>0){const t=document.createElement('span');t.className='tag orange';t.textContent='🔄 '+parseFloat(rec.credit).toLocaleString('el-GR',{minimumFractionDigits:2})+'€';tags.appendChild(t);}

      // Credit due date
      if(rec.date&&!state.viewDone){
        const dueDate=addMonths(rec.date,3);const diff=daysDiff(dueDate);
        const cd=document.createElement('div');
        if(diff<0){cd.className='credit-due overdue';cd.textContent='⚠️ Πιστωτικό ληξιπρόθεσμο ('+fmtDate(dueDate)+')';}
        else if(diff<=30){cd.className='credit-due soon';cd.textContent='⏰ Πιστωτικό έως '+fmtDate(dueDate)+' ('+diff+' ημ.)';}
        else{cd.className='credit-due ok';cd.textContent='📋 Πιστωτικό έως '+fmtDate(dueDate);}
        main.appendChild(cd);
      }
    }
    if(state.cat==='evar'){
      if(rec.amount){const t=document.createElement('span');t.className='tag purple';t.textContent='💶 '+parseFloat(rec.amount).toLocaleString('el-GR',{minimumFractionDigits:2})+'€';tags.appendChild(t);}

    }
    main.appendChild(tags);

    if(rec.notes&&state.editingId!==rec.id){const n=document.createElement('div');n.className='record-notes';n.textContent=rec.notes;main.appendChild(n);}
    if(state.viewDone&&rec.completedAt){const c=document.createElement('div');c.style.cssText='font-size:11px;color:#4ade80;margin-top:4px';c.textContent='✅ Ολοκληρώθηκε: '+fmtDate(rec.completedAt);main.appendChild(c);}

    const actions=document.createElement('div');actions.className='record-actions';
    const editBtn=document.createElement('button');editBtn.className='icon-btn'+(state.editingId===rec.id?' active':'');
    editBtn.title='Επεξεργασία';editBtn.textContent='✏️';
    editBtn.onclick=()=>{state.editingId=state.editingId===rec.id?null:rec.id;render();};
    const delBtn=document.createElement('button');delBtn.className='icon-btn del';delBtn.title='Διαγραφή';delBtn.textContent='🗑';
    delBtn.onclick=()=>{
      if(!confirm('Διαγραφή "'+rec.patient+'"?'))return;
      const key=getKey();const all=state[key];const i=all.findIndex(r=>r.id===rec.id);if(i>-1)all.splice(i,1);
      delete state.selected[rec.id];if(state.editingId===rec.id)state.editingId=null;
      save();render();
    };
    if(state.viewDone){
      const restoreBtn=document.createElement('button');
      restoreBtn.className='icon-btn';restoreBtn.title='Επαναφορά στις ενεργές';
      restoreBtn.textContent='↩️';
      restoreBtn.style.cssText='background:#1a2a3a;border-color:#1e4d7a;color:#4a9eff';
      restoreBtn.onclick=()=>{
        const doneKey=state.cat+'_done';
        const activeKey=state.cat;
        const all=state[doneKey];
        const i=all.findIndex(r=>r.id===rec.id);
        if(i>-1){
          const restored=all.splice(i,1)[0];
          delete restored.completedAt;
          if(!state[activeKey]) state[activeKey]=[];
          state[activeKey].unshift(restored);
        }
        save();render();
      };
      actions.appendChild(restoreBtn);
    }
    actions.appendChild(editBtn);actions.appendChild(delBtn);
    top.appendChild(cb);top.appendChild(main);top.appendChild(actions);
    item.appendChild(top);
    if(state.editingId===rec.id) item.appendChild(makeEditPanel(rec));
    list.appendChild(item);
  });
}

function updateSelectAllCb(){
  const cb=document.getElementById('select-all-cb');if(!cb)return;
  const recs=getFiltered();
  if(!recs.length){cb.checked=false;cb.indeterminate=false;return;}
  const selCount=recs.filter(r=>state.selected[r.id]).length;
  if(selCount===0){cb.checked=false;cb.indeterminate=false;}
  else if(selCount===recs.length){cb.checked=true;cb.indeterminate=false;}
  else{cb.checked=false;cb.indeterminate=true;}
}

function render(){
  renderCatTabs();renderAddSection();renderAlertBar();
  // Hide main toolbar/bulk for pricelist
  const isPL=state.cat==='pricelist';
  document.querySelector('.toolbar').style.display=isPL?'none':'';
  document.getElementById('bulk-bar').style.display=isPL?'none':'';
  document.getElementById('stats').style.display=isPL?'none':'';
  if(isPL){renderPricelist();return;}
  renderSort();renderStats();renderBulkBar();renderRecords();
  updateSelectAllCb();
}

// ── Τιμοκατάλογος ──────────────────────────────────────────────
let plState={query:'',supplier:'all',category:'all',implantType:'initial',bundleMode:'out'};
let plCache=[];

const CAT_LABELS={pacemaker:'Βηματοδότης',icd:'Απινιδωτής',ablation:'Ablation',lead:'Ηλεκτρόδιο/Υλικό',other:'Άλλο'};
const CAT_COLORS={pacemaker:'#60a5fa',icd:'#f87171',ablation:'#c084fc',lead:'#4ade80',other:'#7ab8b8'};

async function plFetch(q){
  q=q.trim();
  if(!q){plCache=[];renderPlResults([]);return;}
  try{
    const enc=encodeURIComponent(q.toUpperCase());
    // search by ref_code (ilike) OR description (ilike)
    const url=SUPA_URL+'/rest/v1/offers?or=(ref_code.ilike.*'+encodeURIComponent(q)+'*,description.ilike.*'+encodeURIComponent(q)+'*)&limit=30&select=*';
    const r=await fetch(url,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    let data=await r.json();
    // apply filters
    if(plState.supplier!=='all') data=data.filter(d=>d.supplier===plState.supplier);
    if(plState.category!=='all') data=data.filter(d=>d.category===plState.category);
    plCache=data;
    renderPlResults(data);
  }catch(e){console.error(e);}
}

async function plFetchBundles(offerId){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/offer_bundles?offer_id=eq.'+offerId+'&order=sort_order',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    return await r.json();
  }catch(e){return [];}
}

function fmtPrice(v){
  if(v===null||v===undefined||v==='') return null;
  const n=parseFloat(v);
  if(isNaN(n)) return null;
  if(n===0) return 'ΔΩΡΕΑΝ';
  return n.toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})+'€';
}

function renderPlResults(data){
  const list=document.getElementById('records');
  list.innerHTML='';
  if(!data.length){
    const q=(document.getElementById('pl-search-inp')||{}).value||'';
    list.innerHTML='<div class="pl-empty">'+(q?'Δεν βρέθηκαν αποτελέσματα για «'+q+'»':'Πληκτρολόγησε REF code ή περιγραφή για αναζήτηση.')+'</div>';
    return;
  }
  data.forEach(item=>{
    const div=document.createElement('div');div.className='pl-result';

    // Header
    const hdr=document.createElement('div');hdr.className='pl-result-header';
    const left=document.createElement('div');left.style.cssText='display:flex;align-items:center;gap:8px;flex-wrap:wrap';
    const ref=document.createElement('div');ref.className='pl-ref';ref.textContent=item.ref_code||'—';
    const badge=document.createElement('span');
    badge.className='pl-cat-badge';
    badge.style.color=CAT_COLORS[item.category]||'#7ab8b8';
    badge.textContent=CAT_LABELS[item.category]||item.category;
    const supTag=document.createElement('span');
    supTag.className='pl-supplier-tag '+(item.supplier==='Boston'?'boston':'medtronic');
    supTag.textContent=item.supplier;
    left.appendChild(ref);left.appendChild(badge);left.appendChild(supTag);
    if(item.pt_code){const ptc=document.createElement('span');ptc.style.cssText='font-size:11px;color:#7ab8b8;background:#1a2828;border:1px solid #2e4444;border-radius:6px;padding:2px 8px';ptc.textContent='ΚΩΔ.ΠΤ: '+item.pt_code;left.appendChild(ptc);}
    if(item.pt_price){const ptp=document.createElement('span');ptp.style.cssText='font-size:11px;color:#fbbf24;background:#2a2a0a;border:1px solid #3a3a0a;border-radius:6px;padding:2px 8px';ptp.textContent='ΤΙΜΗ ΠΤ: '+parseFloat(item.pt_price).toLocaleString('el-GR',{minimumFractionDigits:2})+'€';left.appendChild(ptp);}
    hdr.appendChild(left);
    div.appendChild(hdr);

    // Description
    const desc=document.createElement('div');desc.className='pl-desc';desc.textContent=item.description||'';
    div.appendChild(desc);

    // Price boxes
    const prices=document.createElement('div');prices.className='pl-prices';

    const hasTwoImplant=item.price_purchase!==null && item.price_replacement!==null;
    const hasAblationSell=item.price_sell_insurance!==null || item.price_sell_package!==null;

    if(hasTwoImplant){
      // Show based on implant toggle
      const isInitial=plState.implantType==='initial';
      const box=document.createElement('div');box.className='pl-price-box primary';
      const lbl=document.createElement('div');lbl.className='pl-price-label';
      lbl.textContent=isInitial?'Αρχική Εμφύτευση':'Αντικατάσταση';
      const val=document.createElement('div');val.className='pl-price-val';
      val.textContent=fmtPrice(isInitial?item.price_purchase:item.price_replacement)||'—';
      box.appendChild(lbl);box.appendChild(val);prices.appendChild(box);
    } else if(item.price_purchase!==null){
      const box=document.createElement('div');box.className='pl-price-box primary';
      const lbl=document.createElement('div');lbl.className='pl-price-label';lbl.textContent='Τιμή Αγοράς';
      const val=document.createElement('div');val.className='pl-price-val';val.textContent=fmtPrice(item.price_purchase)||'—';
      box.appendChild(lbl);box.appendChild(val);prices.appendChild(box);
    }

    // CSP pacing
    if(item.price_purchase_csp!=null && plState.implantType==='initial'){
      const boxCSP=document.createElement('div');boxCSP.className='pl-price-box';boxCSP.style.cssText='border-color:#f59e0b;background:#2a1a00';
      const lblCSP=document.createElement('div');lblCSP.className='pl-price-label';lblCSP.textContent='Αρχική με CSP Pacing';
      const valCSP=document.createElement('div');valCSP.className='pl-price-val';valCSP.style.color='#f59e0b';valCSP.textContent=fmtPrice(item.price_purchase_csp)||'—';
      boxCSP.appendChild(lblCSP);boxCSP.appendChild(valCSP);prices.appendChild(boxCSP);
    }

    if(hasAblationSell){
      if(item.price_sell_insurance!==null){
        const box=document.createElement('div');box.className='pl-price-box';
        const lbl=document.createElement('div');lbl.className='pl-price-label';lbl.textContent='Πώληση Ασφάλεια';
        const val=document.createElement('div');val.className='pl-price-val secondary';val.textContent=fmtPrice(item.price_sell_insurance)||'—';
        box.appendChild(lbl);box.appendChild(val);prices.appendChild(box);
      }
      if(item.price_sell_package!==null){
        const box=document.createElement('div');box.className='pl-price-box';
        const lbl=document.createElement('div');lbl.className='pl-price-label';lbl.textContent='Πώληση Πακέτο';
        const val=document.createElement('div');val.className='pl-price-val secondary';val.textContent=fmtPrice(item.price_sell_package)||'—';
        box.appendChild(lbl);box.appendChild(val);prices.appendChild(box);
      }
    }

    div.appendChild(prices);

    // Bundle για Boston pacemaker/icd αρχική εμφύτευση
    // ΚΑΙ για Medtronic ablation (3 κύρια πακέτα)
    // ΚΑΙ για Boston ablation πακέτα (ΗΦΕ, His, Rhythmia A/B, Farapulse)
    const MEDTRONIC_ABLATION_BUNDLES=['PSCC100','AFAPRO28','AFR-00001'];
    const MEDTRONIC_ABLATION_NAMES={
      'PSCC100':'Καθετήρας ηλεκτροδιάτρησης μεμβράνης (PFA)',
      'AFAPRO28':'Καθετήρας κρυοκατάλυσης',
      'AFR-00001':'Καθετήρας χαρτογράφησης και κατάλυσης AFFERA'
    };
    const BOSTON_ABLATION_BUNDLES=['M0044000040','M004EPM96200','M004EPTR5031TH0','M004RC64S0','41M401'];
    const BOSTON_ABLATION_NAMES={
      'M0044000040':'Πακέτο ΗΦΕ',
      'M004EPM96200':'Πακέτο Κατάλυσης Κολποκοιλιακού Κόμβου (His ablation)',
      'M004EPTR5031TH0':'Χρέωση Υλικών Rhythmia — Πακέτο Α',
      'M004RC64S0':'Χρέωση Υλικών Rhythmia — Πακέτο Β',
      '41M401':'Υλικά Farapulse — Pulsed Field Ablation'
    };
    const isMedtronicAblationBundle=item.supplier==='Medtronic' && item.category==='ablation' && MEDTRONIC_ABLATION_BUNDLES.includes(item.ref_code);
    const isBostonAblationBundle=item.supplier==='Boston' && item.category==='ablation' && BOSTON_ABLATION_BUNDLES.includes(item.ref_code);
    const showBundle=(item.supplier==='Boston' && (item.category==='pacemaker'||item.category==='icd') && plState.implantType==='initial') || isMedtronicAblationBundle || isBostonAblationBundle;
    if(showBundle){
      const bundleWrap=document.createElement('div');
      div.appendChild(bundleWrap);
      plFetchBundles(item.id).then(bundles=>{
        if(!bundles.length) return;
        const bDiv=document.createElement('div');bDiv.className='pl-bundle';

        let bundleName='📦 Πακέτο Αρχικής Εμφύτευσης';
        if(isMedtronicAblationBundle) bundleName='📦 Σετ — '+MEDTRONIC_ABLATION_NAMES[item.ref_code];
        else if(isBostonAblationBundle) bundleName='📦 '+BOSTON_ABLATION_NAMES[item.ref_code];

        const btitle=document.createElement('div');btitle.className='pl-bundle-title';btitle.textContent=bundleName;
        bDiv.appendChild(btitle);

        // Κύρια γραμμή (μπλε)
        const mainRow=document.createElement('div');
        mainRow.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:6px 8px;margin-bottom:4px;background:#1a2a3a;border:1px solid #2a4a6a;border-radius:6px;gap:8px;font-size:12px';
        const mainCode=document.createElement('span');mainCode.style.cssText='color:#60a5fa;font-family:monospace;font-size:11px;flex-shrink:0';mainCode.textContent=item.ref_code;
        const mainDesc=document.createElement('span');mainDesc.style.cssText='color:#bfdbfe;flex:1;font-weight:600';mainDesc.textContent=item.description;
        const mainPrice=document.createElement('span');mainPrice.style.cssText='color:#60a5fa;font-weight:700;flex-shrink:0';mainPrice.textContent=fmtPrice(item.price_purchase)||'—';
        mainRow.appendChild(mainCode);mainRow.appendChild(mainDesc);mainRow.appendChild(mainPrice);
        bDiv.appendChild(mainRow);

        let totalActive=parseFloat(item.price_purchase)||0;
        let totalPassive=parseFloat(item.price_purchase)||0;
        let hasDual=false;

        bundles.forEach(b=>{
          const isDual=b.ref_code_alt && b.unit_price_alt;
          if(isDual) hasDual=true;
          const inPackage=plState.bundleMode==='in';

          const row=document.createElement('div');
          row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#1a2e1a;border:1px solid #2a4a2a;border-radius:6px;margin-bottom:3px;gap:8px;font-size:12px';

          const code=document.createElement('span');code.style.cssText='color:#4ade80;font-family:monospace;font-size:11px;flex-shrink:0';
          code.textContent=isDual?(b.ref_code+' / '+b.ref_code_alt):b.ref_code||'';
          const bdesc=document.createElement('span');bdesc.style.cssText='color:#bbf7d0;flex:1';bdesc.textContent=b.description||'';
          const qty=document.createElement('span');qty.style.cssText='color:#6ee7b7;flex-shrink:0;margin:0 6px';qty.textContent='x'+b.quantity;
          const priceWrap=document.createElement('span');priceWrap.style.cssText='flex-shrink:0;text-align:right;white-space:nowrap';

          if(b.is_free && inPackage){
            priceWrap.style.color='#4ade80';priceWrap.style.fontWeight='700';priceWrap.textContent='ΔΩΡΕΑΝ';
          } else if(isDual){
            const priceA=(parseFloat(b.unit_price)||0)*b.quantity;
            const priceP=(parseFloat(b.unit_price_alt)||0)*b.quantity;
            totalActive+=priceA;
            totalPassive+=priceP;
            priceWrap.innerHTML=
              '<span style="color:#60a5fa;font-size:10px;margin-right:2px">'+(b.label_main||'A')+':</span>'+
              '<span style="color:#fcd34d;font-weight:700">'+fmtPrice(priceA)+'</span>'+
              '<span style="color:#7ab8b8;margin:0 4px">|</span>'+
              '<span style="color:#c084fc;font-size:10px;margin-right:2px">'+(b.label_alt||'P')+':</span>'+
              '<span style="color:#fcd34d;font-weight:700">'+fmtPrice(priceP)+'</span>';
          } else {
            const origPrice=(parseFloat(b.price_original)||parseFloat(b.unit_price)||0)*b.quantity;
            totalActive+=origPrice;
            totalPassive+=origPrice;
            priceWrap.innerHTML='<span style="color:#fcd34d;font-weight:700">'+fmtPrice(origPrice)+'</span>';
          }
          row.appendChild(code);row.appendChild(bdesc);row.appendChild(qty);row.appendChild(priceWrap);
          bDiv.appendChild(row);
        });

        // Σύνολο — αν υπάρχει dual τότε 2 γραμμές
        if(hasDual){
          const totalWrap=document.createElement('div');totalWrap.style.cssText='display:flex;justify-content:flex-end;gap:16px;margin-top:6px;padding-top:6px;border-top:1px solid #f59e0b33;flex-wrap:wrap';
          totalWrap.innerHTML=
            '<span style="font-size:12px;color:#7ab8b8">Σύνολο <span style="color:#60a5fa">Active</span>: <strong style="color:#fcd34d">'+fmtPrice(totalActive)+'</strong></span>'+
            '<span style="font-size:12px;color:#7ab8b8">Σύνολο <span style="color:#c084fc">Passive</span>: <strong style="color:#fcd34d">'+fmtPrice(totalPassive)+'</strong></span>';
          bDiv.appendChild(totalWrap);
        } else {
          const totalRow=document.createElement('div');totalRow.className='pl-bundle-total';
          totalRow.innerHTML='<span style="font-size:12px;color:#7ab8b8;margin-right:8px">Σύνολο πακέτου:</span><span class="pl-bundle-total-val">'+fmtPrice(totalActive)+'</span>';
          bDiv.appendChild(totalRow);
        }
        bundleWrap.appendChild(bDiv);
      });
    }

    list.appendChild(div);
  });
}

function renderPricelist(){
  const sec=document.getElementById('add-section');
  sec.innerHTML='';
  const list=document.getElementById('records');

  // Build search UI
  const wrap=document.createElement('div');
  // Implant toggle (only relevant for pacemaker/icd)
  const toggleRow=document.createElement('div');toggleRow.className='pl-implant-toggle';
  [{v:'initial',l:'Αρχική Εμφύτευση'},{v:'replacement',l:'Αντικατάσταση'}].forEach(t=>{
    const b=document.createElement('button');b.className='pl-implant-btn'+(plState.implantType===t.v?' active':'');
    b.textContent=t.l;
    b.onclick=()=>{plState.implantType=t.v;renderPricelist();};
    toggleRow.appendChild(b);
  });
  wrap.appendChild(toggleRow);

  // Bundle mode toggle
  const bundleRow=document.createElement('div');bundleRow.className='pl-implant-toggle';bundleRow.style.marginTop='6px';
  [{v:'out',l:'Ασφάλεια'},{v:'in',l:'Πακέτο'}].forEach(t=>{
    const b=document.createElement('button');
    b.className='pl-implant-btn'+(plState.bundleMode===t.v?' active':'');
    b.style.background=plState.bundleMode===t.v?(t.v==='in'?'#1a3a5f':'#1a2828'):'';
    b.style.borderColor=plState.bundleMode===t.v?(t.v==='in'?'#60a5fa':'#4ade80'):'';
    b.style.color=plState.bundleMode===t.v?(t.v==='in'?'#60a5fa':'#4ade80'):'';
    b.textContent=t.l;
    b.onclick=()=>{plState.bundleMode=t.v;renderPricelist();};
    bundleRow.appendChild(b);
  });
  wrap.appendChild(bundleRow);

  const hint=document.createElement('div');hint.className='pl-hint';hint.style.color='#b2dfdb';hint.textContent='Αρχική Εμφύτευση/Αντικατάσταση αφορά βηματοδότες & απινιδωτές. Ασφάλεια/Πακέτο αφορά μόνο τα bundles ablation Boston.';
  wrap.appendChild(hint);

  // Search row
  const srow=document.createElement('div');srow.className='pl-search-wrap';
  const sinp=document.createElement('input');sinp.className='pl-search-inp';sinp.id='pl-search-inp';
  sinp.type='text';sinp.placeholder='🔍 REF code ή περιγραφή...';sinp.autocomplete='off';
  let searchTimer;
  sinp.oninput=()=>{clearTimeout(searchTimer);plState.query=sinp.value;searchTimer=setTimeout(()=>plFetch(sinp.value),300);};
  sinp.onkeydown=(e)=>{if(e.key==='Enter'){clearTimeout(searchTimer);plState.query=sinp.value;plFetch(sinp.value);}};
  srow.appendChild(sinp);
  wrap.appendChild(srow);

  sec.appendChild(wrap);

  // Restore query or show empty state
  if(plState.query){
    sinp.value=plState.query;
    list.innerHTML='<div class="pl-empty">Φόρτωση...</div>';
    setTimeout(()=>plFetch(plState.query),50);
  } else {
    list.innerHTML='<div class="pl-empty">Πληκτρολόγησε REF code ή περιγραφή για αναζήτηση.</div>';
    setTimeout(()=>sinp.focus(),50);
  }
}

loadFromCloud();
</script>
